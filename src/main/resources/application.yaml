spring:
  application:
    name: fruitshop

  web:
    resources:
      add-mappings: true
  mvc:
    throw-exception-if-no-handler-found: false
    log-resolved-exception: false

  datasource:
    url: jdbc:mysql://localhost:3306/spring_fruitshop?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2KB

server:
  port: 8080
  servlet:
    session:
      persistent: false  # Disable session persistence for development

# JWT Configuration (CHỈ dùng cho Mobile API - Web vẫn dùng Session)
jwt:
  secret: fruitshop-jwt-secret-key-2026-thandinh-spring-boot-application-security
  expiration: 86400000  # 24 hours