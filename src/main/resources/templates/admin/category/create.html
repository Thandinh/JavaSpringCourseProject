<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Thêm danh mục mới - SEA FRUITS Admin</title>
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/assets/admin/images/favicon.png}">

    <link rel="stylesheet" th:href="@{/assets/admin/vendor/owl-carousel/css/owl.carousel.min.css}">
    <link rel="stylesheet" th:href="@{/assets/admin/vendor/owl-carousel/css/owl.theme.default.min.css}">
    <link th:href="@{/assets/admin/vendor/jqvmap/css/jqvmap.min.css}" rel="stylesheet">
    <link th:href="@{/assets/admin/css/style.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid transparent;
            border-radius: 5px;
        }
        .alert-danger {
            color: #721c24;
            background-color: #f8d7da;
            border-color: #f5c6cb;
        }
        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
        }
        .form-group label .required {
            color: red;
            margin-left: 3px;
        }
        .btn-back {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-back:hover {
            background-color: #5a6268;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <div th:replace="~{admin/fragments/preloader :: preloader}"></div>
    <div id="main-wrapper">

        <div th:replace="~{admin/fragments/header :: header}"></div>
        <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
        
        <div class="content-body">
            <div class="container-fluid">

                <div class="row">
                    <div class="col-lg-8 offset-lg-2">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h4 class="card-title mb-0">
                                    <i class="fa fa-plus-circle"></i> Thêm danh mục mới
                                </h4>
                                <a th:href="@{/admin/categories}" class="btn-back">
                                    <i class="fa fa-arrow-left"></i> Quay lại
                                </a>
                            </div>
                            
                            <div class="card-body">
                                <!-- Error Message -->
                                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                                    <strong>Lỗi!</strong> <span th:text="${error}"></span>
                                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                        <span aria-hidden="true">&times;</span>
                                    </button>
                                </div>
                                
                                <!-- Form -->
                                <div class="basic-form">
                                    <form th:action="@{/admin/categories/create}" 
                                          th:object="${category}" 
                                          method="post">
                                        
                                        <div class="form-group">
                                            <label for="name">
                                                Tên danh mục<span class="required">*</span>
                                            </label>
                                            <input type="text" 
                                                   class="form-control" 
                                                   id="name"
                                                   name="name" 
                                                   placeholder="Nhập tên danh mục (ví dụ: Trái cây nhập khẩu, Trái cây Việt Nam...)"
                                                   required
                                                   maxlength="100"
                                                   autofocus>
                                            <small class="form-text text-muted">
                                                Tên danh mục phải là duy nhất và không quá 100 ký tự
                                            </small>
                                        </div>

                                        <div class="form-group mt-4">
                                            <button type="submit" class="btn btn-primary">
                                                <i class="fa fa-save"></i> Tạo danh mục
                                            </button>
                                            <a th:href="@{/admin/categories}" class="btn btn-secondary ml-2">
                                                <i class="fa fa-times"></i> Hủy
                                            </a>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
        
        <div th:replace="~{admin/fragments/footer :: footer}"></div>
    </div>
    
    <script th:src="@{/assets/admin/vendor/global/global.min.js}"></script>
    <script th:src="@{/assets/admin/js/quixnav-init.js}"></script>
    <script th:src="@{/assets/admin/js/custom.min.js}"></script>
    
    <script>
        // Auto-trim input on submit
        document.querySelector('form').addEventListener('submit', function(e) {
            const nameInput = document.getElementById('name');
            nameInput.value = nameInput.value.trim();
            
            if (nameInput.value === '') {
                e.preventDefault();
                alert('Vui lòng nhập tên danh mục');
                nameInput.focus();
            }
        });
    </script>

</body>

</html>
