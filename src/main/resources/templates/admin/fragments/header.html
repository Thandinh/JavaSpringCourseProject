<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="header">
    <!-- Nav header -->
    <div class="nav-header">
        <a th:href="@{/admin/admin-home}" class="brand-logo">
            <img class="logo-abbr" th:src="@{/assets/images/logo.webp}" alt="Brand Logo">
            <span class="brand-title">
                <img class="logo-compact" th:src="@{/assets/images/logo.webp}" alt="">
                SEA FRUITS
            </span>
        </a>

        <div class="nav-control">
            <div class="hamburger">
                <span class="line"></span><span class="line"></span><span class="line"></span>
            </div>
        </div>
    </div>

    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <nav class="navbar navbar-expand">
                <div class="collapse navbar-collapse justify-content-between">
                    <div class="header-left">
                        <div class="search_bar dropdown">
                            <span class="search_icon p-3 c-pointer" data-toggle="dropdown">
                                <i class="mdi mdi-magnify"></i>
                            </span>
                            <div class="dropdown-menu p-0 m-0">
                                <form>
                                    <input class="form-control" type="search" placeholder="Tìm kiếm..." aria-label="Search">
                                </form>
                            </div>
                        </div>
                    </div>

                    <ul class="navbar-nav header-right">
                        <!-- Notification -->
                        <li class="nav-item dropdown notification_dropdown">
                            <a class="nav-link" href="#" role="button" data-toggle="dropdown">
                                <i class="mdi mdi-bell"></i>
                                <div class="pulse-css"></div>
                            </a>
                            <div class="dropdown-menu dropdown-menu-right">
                                <p class="dropdown-header">Thông báo mới</p>
                                <a class="dropdown-item" href="#">
                                    <i class="fa fa-shopping-cart text-primary mr-2"></i>
                                    <span>Đơn hàng mới</span>
                                </a>
                                <a class="dropdown-item" href="#">
                                    <i class="fa fa-user text-success mr-2"></i>
                                    <span>Người dùng mới</span>
                                </a>
                                <div class="dropdown-divider"></div>
                                <a class="dropdown-item text-center" href="#">Xem tất cả</a>
                            </div>
                        </li>

                        <!-- User Profile -->
                        <li class="nav-item dropdown header-profile">
                            <a class="nav-link" href="#" role="button" data-toggle="dropdown">
                                <img th:src="${session.user != null && session.user.avatar != null && !session.user.avatar.isEmpty() ? (session.user.avatar.startsWith('/') || session.user.avatar.startsWith('http') ? session.user.avatar : '/' + session.user.avatar) : '/assets/admin/images/profile/pic1.jpg'}" 
                                     width="20" alt="User Avatar"/>
                                <div class="header-info">
                                    <span class="text-black" th:text="${session.user != null ? session.user.fullName : 'Admin'}">Admin</span>
                                    <p class="fs-12 mb-0">Quản trị viên</p>
                                </div>
                            </a>
                            <div class="dropdown-menu dropdown-menu-right">
                                <a th:href="@{/admin/profile}" class="dropdown-item ai-icon">
                                    <i class="fa fa-user-circle text-primary"></i>
                                    <span class="ml-2">Hồ sơ</span>
                                </a>
                                <a th:href="@{/admin/settings}" class="dropdown-item ai-icon">
                                    <i class="fa fa-cog text-info"></i>
                                    <span class="ml-2">Cài đặt</span>
                                </a>
                                <div class="dropdown-divider"></div>
                                <a th:href="@{/dang-xuat}" class="dropdown-item ai-icon">
                                    <i class="fa fa-sign-out-alt text-danger"></i>
                                    <span class="ml-2">Đăng xuất</span>
                                </a>
                            </div>
                        </li>
                    </ul>
                </div>
            </nav>
        </div>
    </div>
</div>

</body>
</html>
