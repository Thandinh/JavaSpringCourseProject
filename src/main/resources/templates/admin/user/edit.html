<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chỉnh sửa người dùng - Admin</title>
  <link rel="icon" type="image/png" sizes="16x16" th:href="@{/assets/admin/images/favicon.png}">

  <link rel="stylesheet" th:href="@{/assets/admin/vendor/owl-carousel/css/owl.carousel.min.css}">
  <link rel="stylesheet" th:href="@{/assets/admin/vendor/owl-carousel/css/owl.theme.default.min.css}">
  <link th:href="@{/assets/admin/vendor/jqvmap/css/jqvmap.min.css}" rel="stylesheet">
  <link th:href="@{/assets/admin/css/style.css}" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

<div th:replace="~{admin/fragments/preloader :: preloader}"></div>
<div id="main-wrapper">

  <div th:replace="~{admin/fragments/header :: header}"></div>
  <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
  <div class="content-body">
    <div class="container-fluid">

      <!-- Success/Error messages -->
      <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <strong>Thành công!</strong> <span th:text="${successMessage}"></span>
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <strong>Lỗi!</strong> <span th:text="${errorMessage}"></span>
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>

      <div class="row">
        <div class="col-lg-12">
          <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
              <div>
                <a th:href="@{/admin/users}" class="btn btn-sm btn-secondary">
                  <i class="fa-solid fa-arrow-left"></i> Quay lại
                </a>
              </div>
              <h4 class="card-title mb-0">Chỉnh sửa người dùng</h4>
              <div></div>
            </div>
            <div class="card-body">
              <!-- Display current avatar -->
              <div class="text-center mb-4" th:if="${user != null and user.avatar != null and !user.avatar.isEmpty()}">
                <img th:src="${user.avatar}" alt="Avatar hiện tại" width="120" height="120" style="border-radius: 50%; object-fit: cover; border: 3px solid #593bdb;">
                <p class="mt-2 text-muted">Ảnh đại diện hiện tại</p>
              </div>

              <div class="basic-form">
                <form th:action="@{/admin/users/edit/{id}(id=${user.id})}" method="post" enctype="multipart/form-data">
                  <div class="form-row">
                    <div class="form-group col-md-6">
                      <label for="email">Email <span class="text-danger">*</span></label>
                      <input type="email"
                             class="form-control"
                             id="email"
                             name="email"
                             th:value="${user.email}"
                             readonly
                             style="background-color: #f4f4f4;" />
                      <small class="form-text text-muted">Email không thể thay đổi</small>
                    </div>

                    <div class="form-group col-md-6">
                      <label for="password">Mật khẩu mới</label>
                      <input type="password"
                             class="form-control"
                             id="password"
                             name="password"
                             placeholder="Để trống nếu không đổi mật khẩu" />
                      <small class="form-text text-muted">Chỉ nhập nếu muốn thay đổi mật khẩu</small>
                    </div>
                  </div>

                  <div class="form-row">
                    <div class="form-group col-md-6">
                      <label for="fullName">Họ và tên</label>
                      <input type="text"
                             class="form-control"
                             id="fullName"
                             name="fullName"
                             th:value="${user.fullName}"
                             placeholder="Nhập họ và tên" />
                    </div>

                    <div class="form-group col-md-6">
                      <label for="phone">Số điện thoại</label>
                      <input type="text"
                             class="form-control"
                             id="phone"
                             name="phone"
                             th:value="${user.phone}"
                             placeholder="Nhập số điện thoại" />
                    </div>
                  </div>

                  <div class="form-group">
                    <label for="address">Địa chỉ</label>
                    <input type="text"
                           class="form-control"
                           id="address"
                           name="address"
                           th:value="${user.address}"
                           placeholder="Nhập địa chỉ" />
                  </div>

                  <div class="form-row">
                    <div class="form-group col-md-6">
                      <label for="roleName">Vai trò <span class="text-danger">*</span></label>
                      <select class="form-control" id="roleName" name="roleName" required>
                        <option value="ROLE_USER" th:selected="${user.roles.?[name == 'ROLE_ADMIN'].isEmpty()}">User</option>
                        <option value="ROLE_ADMIN" th:selected="${!user.roles.?[name == 'ROLE_ADMIN'].isEmpty()}">Admin</option>
                      </select>
                    </div>

                    <div class="form-group col-md-6">
                      <label for="enabled">Trạng thái <span class="text-danger">*</span></label>
                      <select class="form-control" id="enabled" name="enabled" required>
                        <option value="true" th:selected="${user.enabled == true}">Hoạt động</option>
                        <option value="false" th:selected="${user.enabled == false}">Không hoạt động</option>
                      </select>
                    </div>
                  </div>

                  <div class="form-group">
                    <label for="avatar">Ảnh đại diện mới</label>
                    <div class="custom-file">
                      <input type="file"
                             class="custom-file-input"
                             id="avatar"
                             name="avatar"
                             accept="image/*" />
                      <label class="custom-file-label" for="avatar">Chọn ảnh mới...</label>
                    </div>
                    <small class="form-text text-muted">Chấp nhận file: JPG, PNG, GIF (Tối đa 5MB). Để trống nếu không đổi ảnh.</small>
                  </div>

                  <div class="form-group">
                    <button type="submit" class="btn btn-primary">
                      <i class="fa fa-save"></i> Cập nhật
                    </button>
                    <a th:href="@{/admin/users}" class="btn btn-secondary">
                      <i class="fa fa-times"></i> Hủy
                    </a>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
  <div th:replace="~{admin/fragments/footer :: footer}"></div>
</div>

<script th:src="@{/assets/admin/vendor/global/global.min.js}"></script>
<script th:src="@{/assets/admin/js/quixnav-init.js}"></script>
<script th:src="@{/assets/admin/js/custom.min.js}"></script>

<script th:src="@{/assets/admin/vendor/raphael/raphael.min.js}"></script>
<script th:src="@{/assets/admin/vendor/morris/morris.min.js}"></script>

<script th:src="@{/assets/admin/vendor/circle-progress/circle-progress.min.js}"></script>
<script th:src="@{/assets/admin/vendor/chart.js/Chart.bundle.min.js}"></script>
<script th:src="@{/assets/admin/vendor/gaugeJS/dist/gauge.min.js}"></script>
<script th:src="@{/assets/admin/vendor/flot/jquery.flot.js}"></script>
<script th:src="@{/assets/admin/vendor/flot/jquery.flot.resize.js}"></script>
<script th:src="@{/assets/admin/vendor/owl-carousel/js/owl.carousel.min.js}"></script>
<script th:src="@{/assets/admin/vendor/jqvmap/js/jquery.vmap.min.js}"></script>
<script th:src="@{/assets/admin/vendor/jqvmap/js/jquery.vmap.usa.js}"></script>
<script th:src="@{/assets/admin/vendor/jquery.counterup/jquery.counterup.min.js}"></script>

<script th:src="@{/assets/admin/js/dashboard/dashboard-1.js}"></script>

<script>
  // Update file input label when file is selected
  document.addEventListener('DOMContentLoaded', function() {
    const fileInput = document.querySelector('.custom-file-input');
    if (fileInput) {
      fileInput.addEventListener('change', function(e) {
        const fileName = this.files[0]?.name || 'Chọn ảnh mới...';
        const label = this.nextElementSibling;
        label.textContent = fileName;
      });
    }
  });
</script>

</body>

</html>
