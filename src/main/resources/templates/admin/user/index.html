<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Quản lý Người dùng - Admin</title>
  <link rel="icon" type="image/png" sizes="16x16" th:href="@{/assets/admin/images/favicon.png}">

  <link rel="stylesheet" th:href="@{/assets/admin/vendor/owl-carousel/css/owl.carousel.min.css}">
  <link rel="stylesheet" th:href="@{/assets/admin/vendor/owl-carousel/css/owl.theme.default.min.css}">
  <link th:href="@{/assets/admin/vendor/jqvmap/css/jqvmap.min.css}" rel="stylesheet">
  <link th:href="@{/assets/admin/css/style.css}" rel="stylesheet">
  <link th:href="@{/assets/admin/vendor/sweetalert2/dist/sweetalert2.min.css}" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

<div th:replace="~{admin/fragments/preloader :: preloader}"></div>
<div id="main-wrapper">

  <div th:replace="~{admin/fragments/header :: header}"></div>
  <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
  <div class="content-body">
    <div class="container-fluid">

      <!-- Success/Error messages -->
      <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <strong>Thành công!</strong> <span th:text="${successMessage}"></span>
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <strong>Lỗi!</strong> <span th:text="${errorMessage}"></span>
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>

      <div class="row">
        <div class="col-lg-12">
          <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
              <h4 class="card-title">Tất cả Người dùng <span th:if="${totalItems != null}" class="badge badge-primary" th:text="${totalItems}">0</span></h4>
              <div>
                <select class="form-control form-control-sm d-inline-block" style="width: auto; margin-right: 10px;" 
                        onchange="window.location.href='/admin/users?page=0&size=' + this.value">
                  <option th:value="5" th:selected="${pageSize == 5}">5 / trang</option>
                  <option th:value="10" th:selected="${pageSize == 10}">10 / trang</option>
                  <option th:value="20" th:selected="${pageSize == 20}">20 / trang</option>
                  <option th:value="50" th:selected="${pageSize == 50}">50 / trang</option>
                </select>
                <a th:href="@{/admin/users/create}" class="btn btn-primary btn-sm">
                  <i class="fa fa-plus"></i> Thêm mới
                </a>
              </div>
            </div>
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-striped">
                  <thead class="thead-primary">
                  <tr>
                    <th scope="col">#</th>
                    <th scope="col">Ảnh đại diện</th>
                    <th scope="col">Họ tên</th>
                    <th scope="col">Email</th>
                    <th scope="col">Số điện thoại</th>
                    <th scope="col">Vai trò</th>
                    <th scope="col">Trạng thái</th>
                    <th scope="col">Thao tác</th>
                  </tr>
                  </thead>
                  <tbody>
                  <tr th:each="user, iterStat : ${userList}">
                    <th th:text="${currentPage * pageSize + iterStat.count}">1</th>
                    <td>
                      <span th:if="${user.avatar != null and !user.avatar.isEmpty()}">
                        <img th:src="@{${user.avatar}}"
                             alt="Avatar" 
                             width="40" 
                             height="40" 
                             style="border-radius: 50%; object-fit: cover;" 
                             th:onerror="'console.error(\'Failed to load avatar:\', this.src); this.style.display=\'none\';'" />
                        <i class="fa-solid fa-user-circle" 
                           style="font-size: 40px; color: #593bdb; display: none;"></i>
                      </span>
                      <i th:unless="${user.avatar != null and !user.avatar.isEmpty()}" 
                         class="fa-solid fa-user-circle" 
                         style="font-size: 40px; color: #593bdb;"></i>
                    </td>
                    <td style="color: black;" th:text="${user.fullName != null and !user.fullName.isEmpty() ? user.fullName : 'N/A'}">Họ tên</td>
                    <td style="color: black;" th:text="${user.email}">email@example.com</td>
                    <td style="color: black;" th:text="${user.phone != null and !user.phone.isEmpty() ? user.phone : 'N/A'}">Phone</td>
                    <td>
                      <span th:each="role : ${user.roles}" 
                            th:class="${role.name == 'ROLE_ADMIN' ? 'badge badge-danger' : 'badge badge-info'}"
                            th:text="${role.name == 'ROLE_ADMIN' ? 'Admin' : 'User'}">
                        Role
                      </span>
                    </td>
                    <td>
                      <span th:if="${user.enabled == true}" class="badge badge-success">Hoạt động</span>
                      <span th:if="${user.enabled == false}" class="badge badge-warning">Khóa</span>
                    </td>
                    <td>
                      <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" class="btn btn-sm btn-warning">
                        <i class="fa fa-edit"></i> Sửa
                      </a>
                      <button type="button" 
                              class="btn btn-sm btn-danger btn-delete-user"
                              th:data-user-id="${user.id}"
                              th:data-user-email="${user.email}">
                        <i class="fa fa-trash"></i> Xóa
                      </button>
                    </td>
                  </tr>
                  <tr th:if="${userList == null or userList.isEmpty()}">
                    <td colspan="8" class="text-center">Không có người dùng nào</td>
                  </tr>
                  </tbody>
                </table>
              </div>

              <!-- Pagination -->
              <div th:if="${totalPages != null and totalPages > 1}" class="d-flex justify-content-between align-items-center mt-3">
                <div>
                  <span>Hiển thị <b th:text="${currentPage * pageSize + 1}">1</b> đến 
                    <b th:text="${(currentPage + 1) * pageSize > totalItems ? totalItems : (currentPage + 1) * pageSize}">10</b> 
                    trong tổng số <b th:text="${totalItems}">0</b> người dùng</span>
                </div>
                <nav>
                  <ul class="pagination mb-0">
                    <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                      <a class="page-link" th:href="@{/admin/users(page=${currentPage - 1}, size=${pageSize})}">Trước</a>
                    </li>
                    
                    <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}" 
                        class="page-item" 
                        th:classappend="${i == currentPage ? 'active' : ''}">
                      <a class="page-link" th:href="@{/admin/users(page=${i}, size=${pageSize})}" th:text="${i + 1}">1</a>
                    </li>
                    
                    <li class="page-item" th:classappend="${currentPage >= totalPages - 1 ? 'disabled' : ''}">
                      <a class="page-link" th:href="@{/admin/users(page=${currentPage + 1}, size=${pageSize})}">Sau</a>
                    </li>
                  </ul>
                </nav>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
  <div th:replace="~{admin/fragments/footer :: footer}"></div>
</div>

<script th:src="@{/assets/admin/vendor/global/global.min.js}"></script>
<script th:src="@{/assets/admin/js/quixnav-init.js}"></script>
<script th:src="@{/assets/admin/js/custom.min.js}"></script>

<script th:src="@{/assets/admin/vendor/raphael/raphael.min.js}"></script>
<script th:src="@{/assets/admin/vendor/morris/morris.min.js}"></script>

<script th:src="@{/assets/admin/vendor/circle-progress/circle-progress.min.js}"></script>
<script th:src="@{/assets/admin/vendor/chart.js/Chart.bundle.min.js}"></script>
<script th:src="@{/assets/admin/vendor/gaugeJS/dist/gauge.min.js}"></script>
<script th:src="@{/assets/admin/vendor/flot/jquery.flot.js}"></script>
<script th:src="@{/assets/admin/vendor/flot/jquery.flot.resize.js}"></script>
<script th:src="@{/assets/admin/vendor/owl-carousel/js/owl.carousel.min.js}"></script>
<script th:src="@{/assets/admin/vendor/jqvmap/js/jquery.vmap.min.js}"></script>
<script th:src="@{/assets/admin/vendor/jqvmap/js/jquery.vmap.usa.js}"></script>
<script th:src="@{/assets/admin/vendor/jquery.counterup/jquery.counterup.min.js}"></script>
<script th:src="@{/assets/admin/vendor/sweetalert2/dist/sweetalert2.min.js}"></script>

<script th:src="@{/assets/admin/js/dashboard/dashboard-1.js}"></script>

<script>
  console.log('=== Script loaded');
  
  // Delete user confirmation
  document.addEventListener('DOMContentLoaded', function() {
    console.log('=== DOMContentLoaded fired');
    
    const deleteButtons = document.querySelectorAll('.btn-delete-user');
    console.log('=== Found delete buttons:', deleteButtons.length);
    
    deleteButtons.forEach((button, index) => {
      console.log('=== Adding listener to button', index);
      button.addEventListener('click', function(e) {
        e.preventDefault(); // Prevent any default action
        console.log('=== Button clicked!', index);
        
        const userId = this.getAttribute('data-user-id');
        const userEmail = this.getAttribute('data-user-email');
        console.log('=== User data:', userId, userEmail);
        
        confirmDelete(userId, userEmail);
      });
    });
  });

  function confirmDelete(userId, userEmail) {
    console.log('=== confirmDelete called: userId=', userId, 'userEmail=', userEmail);
    console.log('=== Swal available:', typeof Swal !== 'undefined');
    
    if (typeof Swal === 'undefined') {
      console.error('=== SweetAlert2 is not loaded!');
      alert('Bạn có chắc chắn muốn xóa người dùng: ' + userEmail + '?');
      return;
    }
    
    Swal.fire({
      title: 'Xác nhận xóa?',
      html: `Bạn có chắc chắn muốn xóa người dùng: <b>${userEmail}</b>?<br>Hành động này sẽ đánh dấu xóa user!`,
      type: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#d33',
      cancelButtonColor: '#3085d6',
      confirmButtonText: 'Xóa',
      cancelButtonText: 'Hủy'
    }).then((result) => {
      console.log('=== SweetAlert result:', result);
      console.log('=== result.value:', result.value);
      console.log('=== result.isConfirmed:', result.isConfirmed);
      
      // Check both result.value (old API) and result.isConfirmed (new API)
      if (result.value === true || result.isConfirmed === true) {
        console.log('=== User confirmed delete, creating form...');
        
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/admin/users/delete/' + userId;
        console.log('=== Form action:', form.action);
        
        const csrfInput = document.querySelector('meta[name="_csrf"]');
        console.log('=== CSRF meta tag found:', csrfInput);
        
        if (csrfInput) {
          const csrfToken = document.createElement('input');
          csrfToken.type = 'hidden';
          csrfToken.name = '_csrf';
          csrfToken.value = csrfInput.content;
          console.log('=== CSRF token value:', csrfToken.value);
          form.appendChild(csrfToken);
        } else {
          console.error('=== CSRF meta tag not found!');
        }
        
        document.body.appendChild(form);
        console.log('=== Submitting form...');
        form.submit();
      } else {
        console.log('=== User cancelled delete');
      }
    }).catch((error) => {
      console.error('=== SweetAlert error:', error);
    });
  }
</script>

</body>

</html>
