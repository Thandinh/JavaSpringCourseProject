<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng SeaFruits</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <link rel="stylesheet" th:href="@{/assets/css/grid.css}">
    <link rel="stylesheet" th:href="@{/assets/css/cart.css}">
</head>

<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div id="main">
        <div class="container">
            <div class="navig">
                <a th:href="@{/}">Trang chủ</a>
                <i class="fa-solid fa-chevron-right"></i>
                <a class="item active" href="#">Giỏ hàng</a>
            </div>

            <h2 class="heading-cart">Giỏ hàng của bạn</h2>

            <!-- Empty cart message -->
            <div th:if="${cart == null || #lists.isEmpty(cart)}" class="empty-cart">
                <i class="fas fa-shopping-cart" style="font-size: 80px; color: #ccc; margin-bottom: 20px;"></i>
                <h3>Giỏ hàng của bạn đang trống</h3>
                <p>Hãy thêm sản phẩm vào giỏ hàng để tiếp tục mua sắm!</p>
                <a th:href="@{/san-pham-list}" class="btn-continue">Tiếp tục mua hàng</a>
            </div>

            <!-- Cart items -->
            <div th:if="${cart != null && !#lists.isEmpty(cart)}" class="cart-container">

                <div class="header-cart">
                    <div class="title-product">Sản phẩm</div>
                    <div class="title-price">Giá</div>
                    <div class="title-quantity">Số lượng</div>
                    <div class="title-total">Thành tiền</div>
                </div>

                <div class="body-cart">
                    <div th:each="item : ${cart}" class="item-cart">
                        <div class="item-content">
                            <form th:action="@{/gio-hang}" method="POST" style="display: inline;">
                                <input type="hidden" name="action" value="delete">
                                <input type="hidden" name="productId" th:value="${item.productId}">
                                <div class="item-content_delete" onclick="if(confirm('Bạn có chắc muốn xóa sản phẩm này?')) this.closest('form').submit()">
                                    <i class="fa-solid fa-xmark"></i>
                                </div>
                            </form>
                            <a href="#" class="item-content_image">
                                <img th:src="${item.product.imageUrl != null && !item.product.imageUrl.isEmpty() ? (item.product.imageUrl.startsWith('/') || item.product.imageUrl.startsWith('http') ? item.product.imageUrl : '/' + item.product.imageUrl) : '/assets/images/logo.webp'}" 
                                     th:alt="${item.product.name}"
                                     onerror="this.onerror=null; this.src='/assets/images/logo.webp';">
                            </a>
                            <a href="#" class="item-content_name" th:text="${item.product.name}">Product Name</a>
                        </div>
                        <div class="item-price">
                            <span th:text="${#numbers.formatInteger(item.price, 0, 'COMMA')} + '₫'">0₫</span>
                        </div>
                        
                        <div class="item-quantity">
                            <form th:action="@{/gio-hang}" method="post">
                                <input type="hidden" name="action" value="update">
                                <input type="hidden" name="productId" th:value="${item.productId}">
                                <input type="hidden" name="typeChange" value="">

                                <button type="button" onclick="changeQuantity('decrease', this.form)">−</button>
                                <span th:text="${item.quantity}">1</span>
                                <button type="button" onclick="changeQuantity('increase', this.form)">+</button>
                            </form>
                        </div>
                        <div class="item-total">
                            <span th:text="${#numbers.formatInteger(item.total, 0, 'COMMA')} + '₫'">0₫</span>
                        </div>
                    </div>
                </div>

                <div class="footer-cart">
                    <div class="total-cart">
                        <span>Tổng số thành tiền: </span>
                        <strong id="totalCart" th:text="${#numbers.formatInteger(totalCart, 0, 'COMMA')} + '₫'">0₫</strong>
                    </div>

                    <div class="button-cart">
                        <button onclick="window.location.href='/san-pham-list'">Tiếp tục mua hàng</button>
                        <button onclick="window.location.href='/dat-hang'" class="btn-checkout">Tiến hành thanh toán</button>
                    </div>
                </div>
            
            </div>
        </div>
    </div>

    <div id="spacing-footer"></div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        // Show success message if exists
        const message = /*[[${message}]]*/ null;
        if (message) {
            alert(message);
        }

        function changeQuantity(action, form) {
            form.querySelector('input[name="typeChange"]').value = action;
            form.submit();
        }
    </script>
</body>

</html>
