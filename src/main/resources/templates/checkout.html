<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - SeaFruits</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <link rel="stylesheet" th:href="@{/assets/css/grid.css}">
    <link rel="stylesheet" th:href="@{/assets/css/form.css}">
    <style>
        .checkout-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 40px 0;
        }

        .checkout-section {
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .checkout-section h3 {
            color: #2c6c36;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #7fad39;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 15px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .order-summary-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .order-summary-item:last-child {
            border-bottom: none;
        }

        .order-total {
            display: flex;
            justify-content: space-between;
            padding-top: 15px;
            margin-top: 15px;
            border-top: 2px solid #2c6c36;
            font-size: 18px;
            font-weight: bold;
            color: #2c6c36;
        }

        .btn-order {
            width: 100%;
            padding: 15px;
            background: #7fad39;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-order:hover {
            background: #2c6c36;
            transform: translateY(-2px);
        }

        .alert {
            padding: 12px 20px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 768px) {
            .checkout-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div id="main">
        <div class="container">
            <div class="navig">
                <a th:href="@{/}">Trang chủ</a>
                <i class="fa-solid fa-chevron-right"></i>
                <a th:href="@{/gio-hang}">Giỏ hàng</a>
                <i class="fa-solid fa-chevron-right"></i>
                <a class="item active" href="#">Thanh toán</a>
            </div>

            <h2 style="text-align: center; color: #2c6c36; margin: 30px 0;">THANH TOÁN</h2>

            <!-- Error message -->
            <div th:if="${error}" class="alert alert-danger">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/dat-hang}" method="POST">
                <div class="checkout-container">
                    <!-- Thông tin giao hàng -->
                    <div class="checkout-section">
                        <h3><i class="fas fa-shipping-fast"></i> Thông tin giao hàng</h3>
                        
                        <div class="form-group">
                            <label for="fullName">Họ và tên <span style="color: red;">*</span></label>
                            <input type="text" 
                                   id="fullName" 
                                   name="fullName" 
                                   th:value="${user.fullName}"
                                   required>
                        </div>

                        <div class="form-group">
                            <label for="phone">Số điện thoại <span style="color: red;">*</span></label>
                            <input type="tel" 
                                   id="phone" 
                                   name="phone" 
                                   th:value="${user.phone}"
                                   pattern="[0-9]{10,11}"
                                   required>
                        </div>

                        <div class="form-group">
                            <label for="address">Địa chỉ giao hàng <span style="color: red;">*</span></label>
                            <textarea id="address" 
                                      name="address" 
                                      th:text="${user.address}"
                                      required></textarea>
                        </div>

                        <div class="form-group">
                            <label for="note">Ghi chú đơn hàng (tùy chọn)</label>
                            <textarea id="note" 
                                      name="note" 
                                      placeholder="Ghi chú về đơn hàng, ví dụ: thời gian hay chỉ dẫn địa điểm giao hàng chi tiết hơn."></textarea>
                        </div>
                    </div>

                    <!-- Đơn hàng của bạn -->
                    <div class="checkout-section">
                        <h3><i class="fas fa-shopping-bag"></i> Đơn hàng của bạn</h3>
                        
                        <div>
                            <div th:each="item : ${cart}" class="order-summary-item">
                                <div>
                                    <strong th:text="${item.product.name}">Sản phẩm</strong>
                                    <span th:text="' × ' + ${item.quantity}"> × 1</span>
                                </div>
                                <div th:text="${#numbers.formatInteger(item.total, 0, 'COMMA')} + '₫'">
                                    0₫
                                </div>
                            </div>
                        </div>

                        <div class="order-total">
                            <span>Tổng cộng:</span>
                            <span th:text="${#numbers.formatInteger(totalCart, 0, 'COMMA')} + '₫'">0₫</span>
                        </div>

                        <div style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 5px;">
                            <p style="margin: 0; color: #666; font-size: 14px;">
                                <i class="fas fa-info-circle"></i>
                                Phương thức thanh toán: <strong>Thanh toán khi nhận hàng (COD)</strong>
                            </p>
                        </div>

                        <button type="submit" class="btn-order">
                            <i class="fas fa-check-circle"></i> ĐẶT HÀNG NGAY
                        </button>

                        <p style="text-align: center; margin-top: 15px; color: #666; font-size: 13px;">
                            Bằng việc đặt hàng, bạn đồng ý với 
                            <a href="#" style="color: #7fad39;">Điều khoản sử dụng</a> của chúng tôi
                        </p>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div id="spacing-footer"></div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        // Validate form before submit
        document.querySelector('form').addEventListener('submit', function(e) {
            const fullName = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();

            if (!fullName || !phone || !address) {
                e.preventDefault();
                alert('Vui lòng điền đầy đủ thông tin giao hàng!');
                return false;
            }

            if (!/^[0-9]{10,11}$/.test(phone)) {
                e.preventDefault();
                alert('Số điện thoại không hợp lệ! Vui lòng nhập 10-11 chữ số.');
                return false;
            }

            return confirm('Xác nhận đặt hàng?');
        });
    </script>
</body>

</html>
