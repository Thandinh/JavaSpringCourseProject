<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Lỗi ' + ${errorCode} + ' - Fruitshop'">Lỗi - Fruitshop</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <link rel="stylesheet" th:href="@{/assets/css/grid.css}">
    
    <style>
        .error-container {
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        
        .error-content {
            text-align: center;
            max-width: 600px;
            padding: 40px;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 20px;
            line-height: 1;
        }
        
        .error-title {
            font-size: 32px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }
        
        .error-message {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .error-path {
            font-size: 14px;
            color: #999;
            margin-bottom: 30px;
            font-family: monospace;
            word-break: break-all;
        }
        
        .error-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-error {
            padding: 12px 30px;
            font-size: 16px;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary-error {
            background-color: #3498db;
            color: white;
        }
        
        .btn-primary-error:hover {
            background-color: #2980b9;
        }
        
        .btn-secondary-error {
            background-color: #95a5a6;
            color: white;
        }
        
        .btn-secondary-error:hover {
            background-color: #7f8c8d;
        }
        
        .error-icon {
            font-size: 80px;
            color: #e74c3c;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="error-container">
        <div class="error-content">
            <i class="fas fa-exclamation-triangle error-icon"></i>
            <div class="error-code" th:text="${errorCode}">500</div>
            <h1 class="error-title" th:text="${errorCode == '404' ? 'Không tìm thấy trang' : 
                                                errorCode == '403' ? 'Truy cập bị từ chối' : 
                                                errorCode == '401' ? 'Chưa xác thực' :
                                                errorCode == '400' ? 'Yêu cầu không hợp lệ' :
                                                'Đã xảy ra lỗi'}">Đã xảy ra lỗi</h1>
            <p class="error-message" th:text="${errorMessage}">Đã xảy ra lỗi không mong muốn. Vui lòng thử lại sau.</p>
            <p class="error-path" th:if="${path}" th:text="'Đường dẫn: ' + ${path}"></p>
            
            <div class="error-actions">
                <a href="javascript:history.back()" class="btn-error btn-secondary-error">
                    <i class="fas fa-arrow-left"></i>
                    Quay lại
                </a>
                <a th:href="@{/trang-chu}" class="btn-error btn-primary-error">
                    <i class="fas fa-home"></i>
                    Về trang chủ
                </a>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
