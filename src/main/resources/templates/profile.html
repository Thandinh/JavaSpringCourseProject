<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thông tin cá nhân - Fruitshop</title>

    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/assets/css/grid.css}" />
    <link rel="stylesheet" th:href="@{/assets/css/style.css}" />

    <style>
        .container-profile {
            max-width: 900px;
            margin: 30px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05);
            margin-top: 40px;
            margin-bottom: 50px;
        }
        
        .container-profile h2 {
            text-align: center;
            color: #2c6c36;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
        }
        
        .container-profile h3 {
            color: #2c6c36;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .profile-info {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .profile-info img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #7fad39;
            object-fit: cover;
            margin-bottom: 15px;
        }
        
        .profile-info .default-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #7fad39;
            background: #e9ecef;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }
        
        .profile-info .default-avatar i {
            font-size: 60px;
            color: #7fad39;
        }
        
        .profile-info p {
            margin: 8px 0;
            font-size: 16px;
            color: #555;
        }
        
        .profile-info strong {
            color: #2c6c36;
        }
        
        .alert {
            padding: 12px 20px;
            margin-bottom: 20px;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .form-section {
            margin-bottom: 30px;
            padding: 25px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #2c6c36;
            font-weight: 500;
        }
        
        .form-group input[type="text"],
        .form-group input[type="password"],
        .form-group input[type="file"],
        .form-group input[type="tel"] {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #7fad39;
        }
        
        .btn-submit {
            background-color: #7fad39;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-submit:hover {
            background-color: #6a9130;
        }
        
        .btn-submit i {
            font-size: 14px;
        }
        
        hr {
            border: none;
            border-top: 2px solid #e9ecef;
            margin: 30px 0;
        }
    </style>
    
</head>

<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div id="main">
        <div class="container-profile">
            <h2><i class="fas fa-user-circle"></i> Thông tin cá nhân</h2>
            
            <!-- Profile Info -->
            <div class="profile-info">
                <div th:if="${user.avatar != null and !user.avatar.isEmpty()}">
                    <img th:src="@{${user.avatar}}" alt="Avatar">
                </div>
                <div th:unless="${user.avatar != null and !user.avatar.isEmpty()}" class="default-avatar">
                    <i class="fas fa-user"></i>
                </div>
                
                <p><strong>Email:</strong> <span th:text="${user.email}">user@example.com</span></p>
                <p><strong>Họ và tên:</strong> <span th:text="${user.fullName ?: 'Chưa cập nhật'}">Chưa cập nhật</span></p>
                <p><strong>Số điện thoại:</strong> <span th:text="${user.phone ?: 'Chưa cập nhật'}">Chưa cập nhật</span></p>
                <p><strong>Địa chỉ:</strong> <span th:text="${user.address ?: 'Chưa cập nhật'}">Chưa cập nhật</span></p>
                <p>
                    <strong>Vai trò:</strong> 
                    <span th:if="${user.roles != null and !user.roles.isEmpty()}">
                        <span th:each="role, iterStat : ${user.roles}">
                            <span th:text="${role.name == 'ROLE_ADMIN' ? 'Quản trị viên' : 'Người dùng'}">User</span>
                            <span th:if="${!iterStat.last}">, </span>
                        </span>
                    </span>
                    <span th:unless="${user.roles != null and !user.roles.isEmpty()}">Người dùng</span>
                </p>
            </div>

            <!-- Update Profile Form -->
            <div class="form-section">
                <h3><i class="fas fa-edit"></i> Cập nhật thông tin</h3>
                
                <!-- Success/Error Messages -->
                <div th:if="${successMessage}" class="alert alert-success">
                    <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger">
                    <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
                </div>
                
                <form th:action="@{/thong-tin-ca-nhan/cap-nhat}" method="post">
                    <div class="form-group">
                        <label for="fullName">Họ và tên:</label>
                        <input type="text" id="fullName" name="fullName" 
                               th:value="${user.fullName}" 
                               placeholder="Nhập họ và tên">
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Số điện thoại:</label>
                        <input type="tel" id="phone" name="phone" 
                               th:value="${user.phone}" 
                               placeholder="Nhập số điện thoại">
                    </div>
                    
                    <div class="form-group">
                        <label for="address">Địa chỉ:</label>
                        <input type="text" id="address" name="address" 
                               th:value="${user.address}" 
                               placeholder="Nhập địa chỉ">
                    </div>
                    
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-save"></i> Cập nhật thông tin
                    </button>
                </form>
            </div>

            <hr>

            <!-- Change Password Form -->
            <div class="form-section">
                <h3><i class="fas fa-lock"></i> Đổi mật khẩu</h3>
                
                <!-- Success/Error Messages for Password -->
                <div th:if="${successPassword}" class="alert alert-success">
                    <i class="fas fa-check-circle"></i> <span th:text="${successPassword}"></span>
                </div>
                <div th:if="${errorPassword}" class="alert alert-danger">
                    <i class="fas fa-exclamation-circle"></i> <span th:text="${errorPassword}"></span>
                </div>
                
                <form th:action="@{/thong-tin-ca-nhan/doi-mat-khau}" method="post">
                    <div class="form-group">
                        <label for="currentPassword">Mật khẩu hiện tại:</label>
                        <input type="password" id="currentPassword" name="currentPassword" 
                               placeholder="Nhập mật khẩu hiện tại" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="newPassword">Mật khẩu mới:</label>
                        <input type="password" id="newPassword" name="newPassword" 
                               placeholder="Nhập mật khẩu mới (tối thiểu 6 ký tự)" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Nhập lại mật khẩu mới:</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" 
                               placeholder="Nhập lại mật khẩu mới" required>
                    </div>
                    
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-key"></i> Cập nhật mật khẩu
                    </button>
                </form>
            </div>

            <hr>

            <!-- Update Avatar Form -->
            <div class="form-section">
                <h3><i class="fas fa-image"></i> Cập nhật ảnh đại diện</h3>
                
                <!-- Success/Error Messages for Avatar -->
                <div th:if="${successAvatar}" class="alert alert-success">
                    <i class="fas fa-check-circle"></i> <span th:text="${successAvatar}"></span>
                </div>
                <div th:if="${errorAvatar}" class="alert alert-danger">
                    <i class="fas fa-exclamation-circle"></i> <span th:text="${errorAvatar}"></span>
                </div>
                
                <form th:action="@{/thong-tin-ca-nhan/cap-nhat-avatar}" method="post" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="avatar">Chọn ảnh đại diện:</label>
                        <input type="file" id="avatar" name="avatar" accept="image/*" required>
                    </div>
                    
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-upload"></i> Cập nhật ảnh
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="spacing-footer"></div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script th:inline="javascript">
        // Cập nhật số lượng giỏ hàng
        let productsCart = JSON.parse(localStorage.getItem('productscart')) || [];
        if (document.querySelector('.cart-count')) {
            document.querySelector('.cart-count').innerText = productsCart.length;
        }
    </script>
</body>

</html>
